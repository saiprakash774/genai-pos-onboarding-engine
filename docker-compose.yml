version: "3.8"

services:
  orchestrator:
    build: 
      context: .
      dockerfile: Dockerfile.service
    container_name: orchestrator
    env_file:
      - .env
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - HOST_PROJECT_DIR=c:\Users\saipr\Capstone
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      neo4j:
        condition: service_healthy
      ui:
        condition: service_started
    command: ["python", "scripts/orchestrator.py"]

  ui:
    build:
      context: .
      dockerfile: Dockerfile.service
    container_name: ui
    ports:
      - "8085:8085"
    volumes:
      - .:/app
    command: ["python", "ui/server.py"]

  neo4j:
    image: neo4j:5.12.0
    container_name: neo4j
    environment:
      - NEO4J_AUTH=neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "wget", "http://localhost:7474", "-O", "-"]
      interval: 10s
      timeout: 10s
      retries: 10
